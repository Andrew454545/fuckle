<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Judy Price Guessr</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f2f2f2;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(900px, 100%);
      background: #1b1b1b;
      border: 1px solid #2b2b2b;
      border-radius: 12px;
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 14px;
      color: #c9c9c9;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    input[type="number"] {
      background: #0f0f0f;
      color: #fff;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px 12px;
      width: 180px;
      font-size: 1rem;
    }

    button {
      border: 0;
      border-radius: 8px;
      background: #5e8bff;
      color: #fff;
      font-weight: 600;
      padding: 10px 14px;
      cursor: pointer;
    }

    button.secondary {
      background: #333;
    }

    button:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .status {
      min-height: 24px;
      margin: 8px 0 16px;
      font-weight: 600;
    }

    .status.win {
      color: #66d17a;
    }

    .status.lose {
      color: #ff7878;
    }

    .guess-list {
      margin: 0;
      padding-left: 18px;
      line-height: 1.5;
    }

    .images {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .images img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #444;
      background: #0b0b0b;
    }

    .meta {
      margin-top: 10px;
      color: #aaaaaa;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Judy Price Guessr</h1>
    <p>Guess the current product price. You win if your guess is within <strong>5%</strong>. One image is revealed after each guess.</p>

    <div class="input-row">
      <input id="priceInput" type="number" min="1" step="1" placeholder="Enter price in USD">
      <button id="guessButton">Submit Guess</button>
      <button id="resetButton" class="secondary" type="button">New Round</button>
    </div>

    <div id="status" class="status"></div>

    <ol id="guessList" class="guess-list"></ol>

    <div class="meta" id="meta"></div>

    <section id="images" class="images"></section>
  </main>

  <script>
    const product = {
      name: "Anatomically Correct Judy Hopps Sex Doll 120cm",
      price: 1899,
      sourceUrl: "https://sexndolls.com/products/anatomically-correct-judy-hopps-sex-doll-120cm?srsltid=AfmBOorVC3ikE3nt1tLcOgEr6A6hwehePfQlHueDZykAtHlZ-ypMdOat",
      images: [
        "https://sexndolls.com/cdn/shop/files/anatomically-correct-judy-hopps-sex-doll-120cm-4346657_1200x1200.jpg",
        "https://sexndolls.com/cdn/shop/files/anatomically-correct-judy-hopps-sex-doll-120cm-5157897_1200x1200.jpg",
        "https://sexndolls.com/cdn/shop/files/anatomically-correct-judy-hopps-sex-doll-120cm-6349234.jpg",
        "https://sexndolls.com/cdn/shop/files/anatomically-correct-judy-hopps-sex-doll-120cm-6349234_1200x1200.jpg"
      ]
    };

    const maxGuesses = 5;
    let guesses = [];
    let revealedCount = 0;
    let gameOver = false;

    const priceInput = document.getElementById("priceInput");
    const guessButton = document.getElementById("guessButton");
    const resetButton = document.getElementById("resetButton");
    const statusEl = document.getElementById("status");
    const guessListEl = document.getElementById("guessList");
    const imagesEl = document.getElementById("images");
    const metaEl = document.getElementById("meta");

    function formatMoney(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(value);
    }

    function withinFivePercent(guess, actual) {
      return Math.abs(guess - actual) / actual <= 0.05;
    }

    function revealImage() {
      if (revealedCount >= product.images.length) return;
      const img = document.createElement("img");
      img.src = product.images[revealedCount];
      img.alt = `${product.name} image ${revealedCount + 1}`;
      img.loading = "lazy";
      imagesEl.appendChild(img);
      revealedCount += 1;
    }

    function renderGuesses() {
      guessListEl.innerHTML = "";
      guesses.forEach((guess, index) => {
        const li = document.createElement("li");
        const delta = Math.round(((guess - product.price) / product.price) * 1000) / 10;
        const direction = delta === 0 ? "exact" : delta > 0 ? `${Math.abs(delta)}% high` : `${Math.abs(delta)}% low`;
        li.textContent = `Guess ${index + 1}: ${formatMoney(guess)} (${direction})`;
        guessListEl.appendChild(li);
      });
    }

    function setStatus(message, cls = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${cls}`.trim();
    }

    function handleGuess() {
      if (gameOver) return;
      const guess = Number(priceInput.value);
      if (!Number.isFinite(guess) || guess <= 0) {
        setStatus("Enter a valid price greater than 0.");
        return;
      }

      guesses.push(guess);
      renderGuesses();
      revealImage();

      if (withinFivePercent(guess, product.price)) {
        gameOver = true;
        setStatus(`You win. ${formatMoney(guess)} is within 5% of the real price (${formatMoney(product.price)}).`, "win");
      } else if (guesses.length >= maxGuesses) {
        gameOver = true;
        setStatus(`Out of guesses. The price is ${formatMoney(product.price)}.`, "lose");
      } else {
        const remaining = maxGuesses - guesses.length;
        setStatus(`Not within 5% yet. ${remaining} guess${remaining === 1 ? "" : "es"} left.`);
      }

      guessButton.disabled = gameOver;
      priceInput.value = "";
      priceInput.focus();
    }

    function resetGame() {
      guesses = [];
      revealedCount = 0;
      gameOver = false;
      guessButton.disabled = false;
      guessListEl.innerHTML = "";
      imagesEl.innerHTML = "";
      setStatus("New round started. Take your first guess.");
      priceInput.value = "";
      priceInput.focus();
    }

    guessButton.addEventListener("click", handleGuess);
    priceInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        handleGuess();
      }
    });
    resetButton.addEventListener("click", resetGame);

    metaEl.innerHTML = `Product: <strong>${product.name}</strong><br>Max guesses: <strong>${maxGuesses}</strong><br>Source: <a href="${product.sourceUrl}" target="_blank" rel="noreferrer">Product page</a>`;
    setStatus("Round ready. Enter a price to start revealing images.");
  </script>
</body>
</html>
